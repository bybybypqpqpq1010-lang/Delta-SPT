<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta SPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Delta SPT</h1>
    <button class="key-btn" onclick="window.open('https://t.me/OrxBypass_bot', '_blank')">🔑 الحصول على مفتاح دلتا</button>
    <div class="top-bar">
        <input type="text" id="search" placeholder="ابحث عن سكربت...">
        <button onclick="toggleTheme()">🌙</button>
    </div>
</header>

<nav>
    <button onclick="showTab('home')">الرئيسية</button>
    <button onclick="showTab('fav')">المفضلة ⭐</button>
    <button onclick="showTab('settings')">الإعدادات ⚙️</button>
</nav>

<main>
    <!-- قسم السكربتات -->
    <section id="home" class="tab active">
        <h2>أحدث السكربتات</h2>
        <div class="script-item">
            <p>سكربت هوسين هاب (HusseinHub)</p>
            <button onclick="alert('جاري نسخ السكربت...')">نسخ السكربت 📋</button>
        </div>
        <div class="script-item">
            <p>سكربت ببجي (Performance)</p>
            <button onclick="alert('جاري نسخ السكربت...')">نسخ السكربت 📋</button>
        </div>
        
        <!-- زر القناة -->
        <div style="margin-top: 20px;">
            <button class="channel-btn" onclick="window.open('https://t.me/DeltaSPT', '_blank')">📢 انضم لقناة التطبيق</button>
        </div>
    </section>

    <section id="fav" class="tab"></section>
    <section id="settings" class="tab">
        <h2>الإعدادات</h2>
        <p>يتم حفظ القيم تلقائياً</p>
    </section>
</main>

<script>
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function showTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }
</script>
<script src="script.js"></script>
</body>
</html>
