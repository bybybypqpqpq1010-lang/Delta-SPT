<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta SPT PRO</title>

<style>
:root{
--bg:#0d1117;--card:#161b22;--text:#f0f6fc;--muted:#8b949e;
--blue:#1f6feb;--green:#238636;--red:#da3633;--border:#30363d;
}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);direction:rtl}

header{
padding:12px;background:var(--card);position:sticky;top:0;
display:flex;justify-content:space-between;align-items:center;
border-bottom:1px solid var(--border);
}

.container{max-width:700px;margin:auto;padding:10px}

button{cursor:pointer}

.main{
width:100%;padding:14px;border:none;border-radius:12px;
background:linear-gradient(135deg,#1f6feb,#388bfd);
color:white;font-weight:bold;margin:10px 0
}

input,textarea{
width:100%;margin:5px 0;padding:10px;border-radius:8px;
border:1px solid var(--border);background:var(--card);color:var(--text)
}

textarea{height:90px}

.card{
background:var(--card);padding:12px;margin:10px 0;
border-radius:10px;border:1px solid var(--border);
display:flex;justify-content:space-between;align-items:center
}

.copy{background:var(--blue);color:white;border:none;padding:7px 10px;border-radius:8px}
.del{background:transparent;border:1px solid var(--red);color:var(--red);padding:7px 10px;border-radius:8px}

#admin{display:none;margin:10px 0;padding:12px;border:1px solid var(--green);border-radius:10px;background:var(--card)}

.toast{
position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:var(--green);padding:10px 20px;border-radius:20px;display:none
}
</style>
</head>

<body>

<header>
<h3>Delta SPT PRO</h3>
<button onclick="toggle()">🌙</button>
</header>

<div class="container">

<button class="main"
onclick="window.open('https://t.me/OrxBypass_bot','_blank')">
🤖 الحصول على المفتاح
</button>

<input id="search" placeholder="بحث..." oninput="checkAdmin(this.value)">

<div id="admin">
<h3>لوحة الإشراف</h3>
<input id="name" placeholder="اسم">
<input id="desc" placeholder="وصف">
<textarea id="code" placeholder="كود"></textarea>
<button onclick="addScript()">نشر</button>
</div>

<h3>السكربتات (<span id="count">0</span>)</h3>
<div id="list"></div>

</div>

<div class="toast" id="toast">تم النسخ</div>

<script>
const db="https://delta-spt-default-rtdb.firebaseio.com/scripts";
let admin=false;

function toggle(){
document.body.classList.toggle("light");
}

function checkAdmin(v){
if(v.trim()==="husseinwar"){
admin=true;
document.getElementById("admin").style.display="block";
load();
}

document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v.toLowerCase())?"flex":"none";
});
}

function addScript(){
const n=document.getElementById("name").value;
const d=document.getElementById("desc").value;
const c=document.getElementById("code").value;

if(!n||!d||!c){
alert("املأ البيانات");
return;
}

fetch(db+".json",{
method:"POST",
body:JSON.stringify({name:n,desc:d,code:c})
})
.then(r=>{
if(!r.ok) throw new Error("Firebase Error");
return r.json();
})
.then(()=>{
alert("تم النشر بنجاح");
document.getElementById("name").value="";
document.getElementById("desc").value="";
document.getElementById("code").value="";
load();
})
.catch(err=>{
alert("فشل النشر - تأكد من Firebase Rules");
console.error(err);
});
}

function load(){
fetch(db+".json")
.then(r=>r.json())
.then(d=>{
let list=document.getElementById("list");
list.innerHTML="";

if(!d){
document.getElementById("count").innerText=0;
return;
}

let arr=Object.entries(d);
document.getElementById("count").innerText=arr.length;

arr.forEach(([id,x])=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div>
<b>${x.name}</b><br>
<small>${x.desc}</small>
</div>

<div>
<button class="copy" onclick="copy(\`${btoa(x.code)}\`)">نسخ</button>
${admin?`<button class="del" onclick="del('${id}')">حذف</button>`:""}
</div>
`;

list.appendChild(div);
});
});
}

function del(id){
fetch(db+"/"+id+".json",{method:"DELETE"}).then(load);
}

function copy(c){
navigator.clipboard.writeText(atob(c));
document.getElementById("toast").style.display="block";
setTimeout(()=>toast.style.display="none",2000);

window.open("https://www.effectivecpmnetwork.com/hgn359eg5u?key=64ed1654117b213984688e88e8596776","_blank");
}

load();
</script>

</body>
</html>
