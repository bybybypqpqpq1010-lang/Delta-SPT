<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta SPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Delta SPT</h1>
    <button class="key-btn" onclick="window.open('https://t.me/OrxBypass_bot', '_blank')">🔑 الحصول على مفتاح دلتا</button>
</header>

<nav>
    <button onclick="showTab('home')">الرئيسية</button>
    <button onclick="showTab('fav')">المفضلة</button>
</nav>

<main>
    <section id="home" class="tab active">
        <h2>السكربتات</h2>
        <div class="script-item">
            <span>HusseinHub</span>
            <button onclick="copyText('كود السكربت هنا')">نسخ</button>
        </div>
        <button class="channel-btn" onclick="window.open('https://t.me/DeltaSPT', '_blank')">📢 قناة التطبيق</button>
    </section>
    
    <section id="fav" class="tab">
        <h2>المفضلة</h2>
    </section>
</main>

<script>
    function showTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert('تم النسخ');
    }
</script>
</body>
</html>
