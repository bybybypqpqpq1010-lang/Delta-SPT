<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta SPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Delta SPT</h1>
    <!-- الزر المعتمد (الخيار الثاني) -->
    <button class="key-btn" onclick="window.open('https://t.me/OrxBypass_bot', '_blank')">🔑 الحصول على مفتاح دلتا</button>
    
    <div class="top-bar">
        <input type="text" id="search" placeholder="ابحث عن سكربت...">
        <button onclick="toggleTheme()">🌙</button>
    </div>
</header>

<nav>
    <button onclick="showTab('home')">الرئيسية</button>
    <button onclick="showTab('fav')">المفضلة ⭐</button>
    <button onclick="showTab('settings')">الإعدادات ⚙️</button>
</nav>

<main>
    <section id="home" class="tab active"></section>
    <section id="fav" class="tab"></section>
    <section id="settings" class="tab">
        <h2>الإعدادات</h2>
        <p>يتم حفظ القيم تلقائياً</p>
    </section>
</main>

<div id="toast"></div>

<script>
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }
</script>
<script src="script.js"></script>
</body>
</html>
