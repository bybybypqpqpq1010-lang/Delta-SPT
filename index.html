<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Delta Scripts Hub</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #fff; text-align: center; padding: 15px; }
        .card { background: #1a1a1a; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; }
        .btn { background: #00ffcc; color: #000; padding: 10px; border-radius: 5px; border: none; font-weight: bold; width: 100%; cursor: pointer; }
        .bot-btn { background: #ff0055; color: #fff; padding: 15px; border-radius: 8px; border: none; width: 100%; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>HusseinHub - Delta</h1>
    
    <button class="bot-btn" onclick="window.open('https://t.me/OrxBypass_bot', '_blank')">🔑 فتح بوت الحصول على المفتاح</button>

    <div id="scripts-container">
        <!-- السكربتات -->
        <div class="card"><h3>Auto Farm (فارم تلقائي)</h3><button class="btn" onclick="copyText('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source\'))()')">نسخ السكربت</button></div>
        <div class="card"><h3>ESP (رؤية الجدران)</h3><button class="btn" onclick="copyText('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/ic3w4rz/SpdHub/master/ESP\'))()')">نسخ السكربت</button></div>
        <div class="card"><h3>Infinite Yield (سكربت الأدوات)</h3><button class="btn" onclick="copyText('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source\'))()')">نسخ السكربت</button></div>
        <div class="card"><h3>Speed Hack (سرعة)</h3><button class="btn" onclick="copyText('game.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 100')">نسخ السكربت</button></div>
        <div class="card"><h3>Fly Script (طيران)</h3><button class="btn" onclick="copyText('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/XNEOFF/FlyGuiV3/main/FlyGuiV3.lua\'))()')">نسخ السكربت</button></div>
        <div class="card"><h3>Gravity Control (جاذبية)</h3><button class="btn" onclick="copyText('game.Workspace.Gravity = 50')">نسخ السكربت</button></div>
    </div>

    <script>
        function copyText(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('تم نسخ السكربت بنجاح!');
        }
    </script>
</body>
</html>
