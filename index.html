<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Delta Scripts Hub</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #fff; text-align: center; padding: 10px; }
        .card { background: #1a1a1a; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; }
        .btn { background: #00ffcc; color: #000; padding: 10px; border-radius: 5px; border: none; font-weight: bold; width: 100%; cursor: pointer; }
        .bot-btn { background: #ff0055; color: #fff; padding: 15px; border-radius: 8px; border: none; width: 100%; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>HusseinHub - Delta</h1>
    <button class="bot-btn" onclick="window.open('https://t.me/OrxBypass_bot', '_blank')">🔑 فتح بوت الحصول على المفتاح</button>

    <div id="scripts-container"></div>

    <script>
        const scripts = [
            {name: "Infinite Yield", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source'))()"},
            {name: "Blox Fruits", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/acsu123/HohoV2/main/ScriptOnly'))()"},
            {name: "Pet Simulator 99", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/NukeVsCity/PS99/main/main.lua'))()"},
            {name: "Brookhaven", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/dohnto/Brookhaven/main/script'))()"},
            {name: "Adopt Me", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/1f0cky/AdoptMe/main/Script'))()"},
            {name: "Doors", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/mstudio45/Doors/main/main'))()"},
            {name: "Murder Mystery 2", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/Boxpen/MM2/main/script'))()"}
            // يمكنك إضافة البقية بنفس هذا التنسيق
        ];

        const container = document.getElementById('scripts-container');
        
        scripts.forEach(s => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h3>${s.name}</h3>`;
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = 'نسخ السكربت';
            // نستخدم دالة مخصصة لفك تشفير الكود قبل نسخه
            btn.onclick = () => copyText(s.code);
            div.appendChild(btn);
            container.appendChild(div);
        });

        function copyText(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            try {
                document.execCommand('copy');
                alert('تم النسخ بنجاح!');
            } catch (err) {
                alert('فشل النسخ، جرب الضغط مطولاً داخل الصندوق');
            }
            document.body.removeChild(el);
        }
    </script>
</body>
</html>
