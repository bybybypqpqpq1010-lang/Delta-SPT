<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta SPT</title>

<style>
:root{
--bg:#0d1117;--card:#161b22;--text:#f0f6fc;--muted:#8b949e;
--blue:#1f6feb;--green:#238636;--yellow:#d29922;--red:#da3633;
--border:#30363d;
}
.light-mode{
--bg:#f6f8fa;--card:#fff;--text:#24292f;--muted:#57606a;
--blue:#0969da;--green:#1a7f37;--yellow:#9a6700;--red:#cf222e;
--border:#d0d7de;
}

*{box-sizing:border-box;font-family:Arial;margin:0;padding:0;transition:.2s}
body{background:var(--bg);color:var(--text);direction:rtl}

header{
display:flex;justify-content:space-between;align-items:center;
padding:12px;background:var(--card);position:sticky;top:0
}

button{cursor:pointer}

.container{max-width:650px;margin:auto;padding:10px}

.main-btn{
width:100%;padding:14px;border:none;border-radius:12px;
background:linear-gradient(135deg,#1f6feb,#388bfd);color:white;font-weight:bold
}

.search{width:100%;padding:12px;border-radius:10px;
border:1px solid var(--border);background:var(--card);color:var(--text);margin:10px 0}

.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}

.tab{padding:10px;border-radius:10px;background:var(--card);
border:1px solid var(--border);color:var(--muted);text-align:center}

.banner{margin:10px 0;padding:10px;border:1px dashed var(--blue);
color:var(--muted);border-radius:10px}

.card{background:var(--card);padding:12px;margin:10px 0;
border-radius:12px;border:1px solid var(--border);
display:flex;justify-content:space-between;align-items:center}

.card h3{margin:0}
.card p{color:var(--muted);font-size:13px}

.btn{padding:8px 10px;border-radius:8px;border:none}
.copy{background:var(--blue);color:white}
.del{background:transparent;border:1px solid var(--red);color:var(--red)}

#admin{display:none;background:var(--card);padding:12px;margin:10px 0;
border:1px solid var(--green);border-radius:12px}

input,textarea{
width:100%;margin:5px 0;padding:10px;border-radius:8px;
border:1px solid var(--border);background:var(--bg);color:var(--text)
}

textarea{height:90px}

.toast{
position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:var(--green);padding:10px 20px;color:white;border-radius:20px;display:none
}
</style>
</head>

<body>

<header>
<h2>Delta SPT</h2>
<button onclick="toggleTheme()">🌙</button>
</header>

<div class="container">

<button class="main-btn"
onclick="window.open('https://t.me/OrxBypass_bot','_blank')">
🤖 الحصول على المفتاح
</button>

<input class="search" id="search" placeholder="ابحث..." oninput="searchFun(this.value)">

<div class="tabs">
<div class="tab">الرئيسية</div>
<div class="tab" onclick="window.open('https://t.me/DeltaSPT','_blank')">القناة</div>
<div class="tab">المفضلة</div>
<div class="tab">الإعدادات</div>
</div>

<div class="banner">
📢 تابع قناة Delta SPT للحصول على التحديثات
</div>

<div id="admin">
<h3>لوحة التحكم</h3>
<input id="name" placeholder="اسم">
<input id="desc" placeholder="وصف">
<textarea id="code" placeholder="كود"></textarea>
<button onclick="add()">نشر</button>
</div>

<h3>✨ السكربتات (<span id="count">0</span>)</h3>
<div id="list"></div>

</div>

<div class="toast" id="toast">تم النسخ</div>

<script>
const db="https://delta-spt-default-rtdb.firebaseio.com/scripts";

let admin=false;

function toggleTheme(){
document.body.classList.toggle("light-mode")
}

function searchFun(v){
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v.toLowerCase())?"flex":"none"
})
if(v.trim()=="husseinwar"){
document.getElementById("admin").style.display="block"
admin=true
}
}

function load(){
fetch(db+".json")
.then(r=>r.json())
.then(d=>{
let list=document.getElementById("list")
list.innerHTML=""
if(!d)return
let arr=Object.entries(d)
document.getElementById("count").innerText=arr.length

arr.forEach(([id,x])=>{
let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<div>
<h3>${x.name}</h3>
<p>${x.desc}</p>
</div>

<div>
<button class="btn copy" onclick="copyCode(\`${btoa(x.code)}\`)">نسخ</button>
${admin?`<button class='btn del' onclick="del('${id}')">حذف</button>`:""}
</div>
`
list.appendChild(div)
})
})
}

function add(){
let name=name.value,desc=desc.value,code=code.value
fetch(db+".json",{method:"POST",body:JSON.stringify({name,desc,code})})
.then(()=>{load()})
}

function del(id){
fetch(db+"/"+id+".json",{method:"DELETE"}).then(load)
}

function copyCode(c){
    try {
        navigator.clipboard.writeText(atob(c));

        document.getElementById("toast").style.display = "block";
        setTimeout(()=>toast.style.display="none",2000);

        // 🔥 فتح رابط الإعلان بعد النسخ
        window.open(
            "https://www.effectivecpmnetwork.com/hgn359eg5u?key=64ed1654117b213984688e88e8596776",
            "_blank"
        );

    } catch(e){
        alert("خطأ في النسخ");
    }
      }function copyCode(c){
    try {
        navigator.clipboard.writeText(atob(c));

        document.getElementById("toast").style.display = "block";
        setTimeout(()=>toast.style.display="none",2000);

        // 🔥 فتح رابط الإعلان بعد النسخ
        window.open(
            "https://www.effectivecpmnetwork.com/hgn359eg5u?key=64ed1654117b213984688e88e8596776",
            "_blank"
        );

    } catch(e){
        alert("خطأ في النسخ");
    }
}

load()
</script>

</body>
</html>
