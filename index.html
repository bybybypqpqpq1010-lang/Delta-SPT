<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta SPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Delta SPT</h1>
    <button class="key-btn" onclick="window.open('https://t.me/OrxBypass_bot', '_blank')">🔑 الحصول على مفتاح دلتا</button>
    <div class="top-bar">
        <input type="text" id="search" placeholder="ابحث عن سكربت...">
        <button onclick="toggleTheme()">🌙</button>
    </div>
</header>

<nav>
    <button onclick="showTab('home')">الرئيسية</button>
    <button onclick="showTab('fav')">المفضلة ⭐</button>
    <button onclick="showTab('settings')">الإعدادات ⚙️</button>
</nav>

<main>
    <section id="home" class="tab active">
        <h2>أحدث السكربتات</h2>
        <!-- السكربتات -->
        <div class="script-item">
            <p>HusseinHub</p>
            <button onclick="copyScript('كود سكربت هوسين هاب هنا')">نسخ 📋</button>
        </div>
        <div class="script-item">
            <p>PUBG Script</p>
            <button onclick="copyScript('كود سكربت ببجي هنا')">نسخ 📋</button>
        </div>

        <!-- زر القناة -->
        <div style="margin-top: 20px;">
            <button class="channel-btn" onclick="window.open('https://t.me/DeltaSPT', '_blank')">📢 انضم لقناة التطبيق</button>
        </div>
    </section>

    <section id="fav" class="tab">
        <h2>المفضلة</h2>
        <p>لا توجد سكربتات في المفضلة بعد.</p>
    </section>

    <section id="settings" class="tab">
        <h2>الإعدادات</h2>
        <p>تفعيل الوضع الليلي تلقائي.</p>
    </section>
</main>

<div id="toast" style="display:none; position:fixed; bottom:20px; background:#333; color:white; padding:10px; border-radius:5px; width:80%; text-align:center; left:10%;">تم النسخ بنجاح!</div>

<script>
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function showTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
    }
    
    // دالة النسخ التي تحل مشكلة الإعلان وتظهر رسالة تأكيد
    function copyScript(text) {
        navigator.clipboard.writeText(text);
        let toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }
</script>
</body>
</html>
