<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>HusseinHub Pro</title>
    <style>
        :root { --primary: #00ffcc; --secondary: #ff0055; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: #fff; text-align: center; padding: 20px; }
        h1 { color: var(--primary); text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .btn { background: var(--primary); color: #000; padding: 12px; border-radius: 8px; border: none; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .bot-btn { background: var(--secondary); color: #fff; padding: 15px; border-radius: 10px; border: none; width: 100%; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>HusseinHub - Pro Edition</h1>
    <button class="bot-btn" onclick="window.open('https://t.me/OrxBypass_bot', '_blank')">🔑 فتح بوت الحصول على المفتاح</button>

    <div class="grid" id="scripts-container"></div>

            {name: "Doors", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/mstudio45/Doors/main/main'))()"},
            {name: "MM2 Auto Farm", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/Boxpen/MM2/main/script'))()"},
            {name: "Bedwars", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/7GrandDadPGN/VapeV4ForRoblox/main/NewMainScript.lua'))()"},

            {name: "All Star Tower Defense", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/123qweasd/ASTD/main/Script'))()"},
            {name: "Blade Ball", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/1f0cky/BladeBall/main/Script'))()"},
            {name: "Gym League", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/NukeVsCity/GymLeague/main/Script'))()"},
            {name: "Speed Run 4", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/wally-rblx/speed-run-4/master/main.lua'))()"},

        ];

        const container = document.getElementById('scripts-container');
        scripts.forEach(s => {
            container.innerHTML += `<div class="card"><h3>${s.name}</h3><button class="btn" onclick="runCopy('${s.code}')">نسخ السكربت</button></div>`;
        });

        function runCopy(code) {
            const el = document.createElement('textarea');
            el.value = code;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('تم النسخ! سيفتح الإعلان لدعمنا...');
            setTimeout(() => { window.open(adLink, '_blank'); }, 500);
        }
    </script>
</body>
</html>
