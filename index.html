<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Delta Scripts Hub</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #fff; text-align: center; padding: 10px; }
        .card { background: #1a1a1a; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; }
        .btn { background: #00ffcc; color: #000; padding: 10px; border-radius: 5px; border: none; font-weight: bold; width: 100%; cursor: pointer; }
        .bot-btn { background: #ff0055; color: #fff; padding: 15px; border-radius: 8px; border: none; width: 100%; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>HusseinHub - Delta</h1>
    <button class="bot-btn" onclick="window.open('https://t.me/OrxBypass_bot', '_blank')">🔑 فتح بوت الحصول على المفتاح</button>

    <div id="scripts-container"></div>

    <script>
        const adLink = "https://www.effectivecpmnetwork.com/hgn359eg5u?key=64ed1654117b213984688e88e8596776";
        
        const scripts = [
            {name: "Infinite Yield", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source'))()"},
            {name: "Blox Fruits Auto Farm", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/acsu123/HohoV2/main/ScriptOnly'))()"},
            {name: "Pet Simulator 99", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/NukeVsCity/PS99/main/main.lua'))()"},
            {name: "Brookhaven GUI", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/dohnto/Brookhaven/main/script'))()"},
            {name: "Adopt Me Autofarm", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/1f0cky/AdoptMe/main/Script'))()"},
            {name: "Doors (Entities)", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/mstudio45/Doors/main/main'))()"},
            {name: "MM2 Auto Farm", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/Boxpen/MM2/main/script'))()"},
            {name: "Bedwars Vape V4", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/7GrandDadPGN/VapeV4ForRoblox/main/NewMainScript.lua'))()"},
            {name: "Da Hood GUI", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/y3tix/DaHood/main/Script'))()"},
            {name: "Tower of Hell", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/wally-rblx/tower-of-hell/master/main.lua'))()"},
            {name: "Sol's RNG Auto Roll", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/CoolingGhost/SolsRNG/main/Script'))()"},
            {name: "Blox Fruits ESP", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/batti123/Roblox/main/BloxFruitsESP'))()"},
            {name: "All Star Tower Defense", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/123qweasd/ASTD/main/Script'))()"},
            {name: "Blade Ball Autofarm", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/1f0cky/BladeBall/main/Script'))()"},
            {name: "Gym League Auto Lift", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/NukeVsCity/GymLeague/main/Script'))()"},
            {name: "Speed Run 4", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/wally-rblx/speed-run-4/master/main.lua'))()"},
            {name: "Break In Story", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/1f0cky/BreakIn/main/Script'))()"},
            {name: "Piggy GUI", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/wally-rblx/piggy/master/main.lua'))()"},
            {name: "Theme Park Tycoon 2", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/1f0cky/ThemePark/main/Script'))()"},
            {name: "Gravity Controller", code: "game.Workspace.Gravity = 50"},
            {name: "Fly Script V3", code: "loadstring(game:HttpGet('https://raw.githubusercontent.com/XNEOFF/FlyGuiV3/main/FlyGuiV3.lua'))()"},
            {name: "WalkSpeed 100", code: "game.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 100"}
        ];

        const container = document.getElementById('scripts-container');
        
        scripts.forEach(s => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h3>${s.name}</h3>`;
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = 'نسخ السكربت';
            btn.onclick = () => {
                copyText(s.code);
                // تأخير فتح الإعلان لمدة 1000 مللي ثانية (ثانية واحدة)
                setTimeout(() => {
                    window.open(adLink, '_blank');
                }, 1000);
            };
            div.appendChild(btn);
            container.appendChild(div);
        });

        function copyText(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('تم نسخ السكربت! سيفتح الإعلان الآن...');
        }
    </script>
</body>
</html>
