<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Delta Scripts Hub</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #fff; text-align: center; padding: 15px; }
        .card { background: #1a1a1a; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #333; }
        .btn { background: #00ffcc; color: #000; padding: 12px; border-radius: 5px; border: none; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .bot-btn { background: #ff0055; color: #fff; padding: 15px; border-radius: 8px; border: none; width: 100%; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>HusseinHub - Delta</h1>
    
    <!-- زر البوت -->
    <button class="bot-btn" onclick="window.open('https://t.me/OrxBypass_bot', '_blank')">🔑 فتح بوت الحصول على المفتاح</button>

    <!-- قائمة السكربتات -->
    <div class="card">
        <h3>سكربت فارم تلقائي</h3>
        <button class="btn" onclick="copyText('loadstring(game:HttpGet(\'رابط_السكربت_1\'))()')">اضغط للنسخ</button>
    </div>

    <div class="card">
        <h3>سكربت طيران</h3>
        <button class="btn" onclick="copyText('loadstring(game:HttpGet(\'رابط_السكربت_2\'))()')">اضغط للنسخ</button>
    </div>

    <script>
        function copyText(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert('تم نسخ السكربت بنجاح!');
        }
    </script>
</body>
</html>
