<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta SPT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .script-container { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .script-card {
            background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 12px;
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .script-card:hover { transform: translateY(-2px); }
        .script-info h3 { margin: 0 0 5px 0; color: #ffc107; font-size: 16px; }
        .script-info p { margin: 0; color: #bbb; font-size: 12px; }
        .copy-btn {
            background: #007bff; color: white; border: none; padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .section-title { color: #007bff; border-bottom: 2px solid #2a2a2a; padding-bottom: 5px; margin-top: 25px; font-size: 18px; font-weight: bold; }
        .channel-top-btn {
            background: linear-gradient(45deg, #0088cc, #00a2ed); color: white; border: none;
            padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 15px; cursor: pointer;
        }
        /* تصميم لوحة التحكم المخفية */
        #admin-panel { display: none; background: #222; padding: 15px; border-radius: 12px; margin-top: 20px; border: 2px dashed #007bff; }
        #admin-panel input, #admin-panel textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <h1>Delta SPT</h1>
    <button class="key-btn" onclick="window.open('https://t.me/OrxBypass_bot', '_blank')">🔑 الحصول على مفتاح دلتا</button>
    <div class="top-bar">
        <!-- إذا كتبت هنا كلمة السر admin123 ستفتح لك لوحة الإضافة فوراً -->
        <input type="text" id="search" placeholder="ابحث عن سكربت لماب..." oninput="checkAdmin(this.value)">
        <button onclick="toggleTheme()">🌙</button>
    </div>
</header>

<nav>
    <button onclick="showTab('home')">الرئيسية</button>
    <button onclick="window.open('https://t.me/DeltaSPT', '_blank')">📢 القناة</button>
    <button onclick="showTab('fav')">المفضلة ⭐</button>
    <button onclick="showTab('settings')">الإعدادات ⚙️</button>
</nav>

<main>
    <section id="home" class="tab active">
        <div style="margin-bottom: 25px;">
            <button class="channel-top-btn" onclick="window.open('https://t.me/DeltaSPT', '_blank')">📢 انضم لقناة التطبيق الرسمية للتحديثات</button>
        </div>

        <!-- لوحة تحكم المطور حسين لإضافة السكربتات -->
        <div id="admin-panel">
            <h3 style="color: #28a745; margin-top: 0;">🛠️ لوحة تحكم المطور (حسين)</h3>
            <input type="text" id="script-name" placeholder="اسم ماب روبلوكس (مثال: Blox Fruits)">
            <input type="text" id="script-desc" placeholder="وصف السكربت وماذا يفعل...">
            <textarea id="script-code" placeholder="الصق كود السكربت البرمجي هنا..." rows="3"></textarea>
            <button onclick="addScriptToServer()" style="background: #28a745; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer;">نشر السكربت لجميع المستخدمين 🚀</button>
        </div>

        <div class="section-title">🔥 سكربتات المابات المضافة حديثاً</div>
        <!-- هنا ستظهر السكربتات التي تضيفها أنت تلقائياً من الفايربيس -->
        <div class="script-container" id="dynamic-scripts">
            <p style="color: #888; text-align: center;">جاري تحميل السكربتات من السيرفر...</p>
        </div>
    </section>

    <section id="fav" class="tab">
        <h2>المفضلة ⭐</h2>
        <p style="color: #888; text-align: center; margin-top: 50px;">السكربتات المحفوظة تظهر هنا.</p>
    </section>

    <section id="settings" class="tab">
        <h2>الإعدادات ⚙️</h2>
        <div class="script-card" style="margin-top: 20px;">
            <p>الوضع الليلي التلقائي</p>
            <button class="copy-btn" style="background:#28a745;" onclick="toggleTheme()">تغيير 🌙</button>
        </div>
    </section>
</main>

<div id="toast" style="display:none; position:fixed; bottom:20px; background:#28a745; color:white; padding:12px 24px; border-radius:8px; width:80%; text-align:center; left:10%; z-index: 10000; font-weight: bold;">تم النسخ! جاري فتح الإعلان...</div>

<!-- ربط ملف الجافاسكربت -->
<script src="script.js"></script>
</body>
</html>
