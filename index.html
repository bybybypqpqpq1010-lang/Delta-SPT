<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta SPT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="brand">
            <img src="https://via.placeholder.com/42" alt="Delta Logo"> <h1>Delta SPT</h1>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </header>

    <div class="container">
        
        <div class="key-btn-container">
            <button class="main-key-btn" onclick="window.open('https://www.effectivecpmnetwork.com/hgn359eg5u?key=64ed1654117b213984688e88e8596776', '_blank')">🔑 الحصول على مفتاح دلتا</button>
        </div>

        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="search-bar" placeholder="ابحث عن ماب، أو اكتب كلمة السر..." oninput="checkAdmin(this.value)">
        </div>

        <div class="nav-tabs">
            <button class="tab-button active" onclick="alert('أنت في الرئيسية حالياً')">الرئيسية 🔥</button>
            <button class="tab-button" onclick="window.open('https://t.me/your_channel', '_blank')">القناة 📢</button>
            <button class="tab-button" onclick="alert('قريباً...')">المفضلة ⭐</button>
            <button class="tab-button" onclick="alert('قريباً...')">الإعدادات ⚙️</button>
        </div>

        <div class="announcement-banner">
            📢 انضم لقناة التطبيق الرسمية لمعرفة آخر التحديثات والسكربتات!
        </div>

        <div id="admin-panel" style="display: none;">
            <h2 id="panel-title" style="color: var(--accent-green);">🛠️ لوحة تحكم المطور (إضافة سكربت جديد)</h2>
            <input type="hidden" id="edit-key">
            
            <div class="form-group">
                <input type="text" id="script-name" placeholder="اسم ماب روبلوكس (مثال: Blox Fruits)">
            </div>
            <div class="form-group">
                <input type="text" id="script-desc" placeholder="وصف السكربت وماذا يفعل...">
            </div>
            <div class="form-group">
                <textarea id="script-code" placeholder="الصق كود السكربت البرمجي هنا..."></textarea>
            </div>
            
            <button id="submit-btn" class="submit-btn" style="background-color: var(--accent-green); color: white;" onclick="addScriptToServer()">نشر السكربت لجميع المستخدمين 🚀</button>
            <button id="cancel-edit-btn" class="submit-btn" style="background-color: #30363d; color: white; margin-top: 10px; display: none;" onclick="resetAdminPanel()">إلغاء التعديل ❌</button>
        </div>

        <div class="section-title">
            ✨ سكربتات المابات المرتبة أبجدياً (A-Z)
        </div>

        <div id="dynamic-scripts">
            </div>

    </div>

    <div id="toast">📋 تم نسخ السكربت بنجاح! افتح روبلوكس والصقه.</div>

    <script src="script.js"></script>
</body>
</html>
